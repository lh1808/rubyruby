const YAML_TO_CFG = {
  "mlflow.experiment_name":"expName","constants.SEED":"seed","constants.parallel_level":"parallelLevel",
  "data_files.x_file":"x_file","data_files.t_file":"t_file","data_files.y_file":"y_file","data_files.s_file":"s_file",
  "data_files.eval_x_file":"eval_x_file","data_files.eval_t_file":"eval_t_file","data_files.eval_y_file":"eval_y_file","data_files.eval_s_file":"eval_s_file","data_files.eval_mask_file":"eval_mask_file",
  "treatment.type":"treatmentType","treatment.reference_group":"refGroup",
  "historical_score.name":"histScoreName","historical_score.column":"histScoreCol","historical_score.higher_is_better":"histScoreHigher",
  "data_processing.validate_on":"validateOn","data_processing.cross_validation_splits":"cvSplits",
  "data_processing.df_frac":"dfFrac","data_processing.reduce_memory":"reduceMem",
  "feature_selection.enabled":"fsEnabled","feature_selection.top_pct":"fsTopPct","feature_selection.correlation_threshold":"fsCorrThresh","feature_selection.max_features":"fsMaxFeatures",
  "models.models_to_train":"models",
  "base_learner.type":"baseLearner",
  "causal_forest.use_econml_tune":"cfTune","causal_forest.tune_max_rows":"cfTuneMaxRows",
  "tuning.enabled":"tuningEnabled","tuning.n_trials":"tuningTrials","tuning.single_fold":"tuningSingleFold","tuning.metric":"tuningMetric",
  "tuning.per_role":"tuningPerRole","tuning.per_learner":"tuningPerLearner","tuning.timeout_seconds":"tuningTimeout","tuning.max_tuning_rows":"tuningMaxRows",
  "final_model_tuning.enabled":"fmtEnabled","final_model_tuning.models":"fmtModels","final_model_tuning.single_fold":"fmtSingleFold","final_model_tuning.stability_penalty":"fmtStabilityPenalty","final_model_tuning.n_trials":"fmtTrials",
  "final_model_tuning.max_tuning_rows":"fmtMaxRows","final_model_tuning.timeout_seconds":"fmtTimeout",
  "learner_data_usage.s_learner_frac":"fracSL","learner_data_usage.t_learner_group_frac":"fracTL","learner_data_usage.x_learner_group_frac":"fracXL",
  "learner_data_usage.dml_frac":"fracDML","learner_data_usage.dr_learner_frac":"fracDR",
  "shap_values.calculate_shap_values":"explEnabled","shap_values.n_shap_values":"explSampleSize","shap_values.top_n_features":"explTopN","shap_values.num_bins":"shapBins",
  "segment_analysis.enabled":"segEnabled","segment_analysis.quantiles":"segQuantiles","segment_analysis.top_n_features":"segTopFeatures",
  "segment_analysis.max_bins":"segMaxBins","segment_analysis.max_categories":"segMaxCats",
  "selection.metric":"selMetric","selection.higher_is_better":"higherBetter","selection.refit_champion_on_full_data":"refitChamp","selection.manual_champion":"manualChamp",
  "surrogate_tree.enabled":"surrEnabled","surrogate_tree.min_samples_leaf":"surrMinLeaf","surrogate_tree.num_leaves":"surrLeaves","surrogate_tree.max_depth":"surrDepth",
  "optional_output.output_dir":"outputDir","optional_output.save_predictions":"savePreds","optional_output.predictions_format":"predsFormat","optional_output.max_prediction_rows":"maxPredRows",
  "bundle.enabled":"bundleEnabled","bundle.base_dir":"bundleDir","bundle.include_challengers":"bundleChallengers","bundle.log_to_mlflow":"bundleMlflow",
};

const parseYamlToCfg = (yamlText) => {
  const result = {...DEFAULT_CFG};
  let section = "";
  for(const raw of yamlText.split("\n")) {
    const line = raw.replace(/#.*$/,"").trimEnd(); // strip comments
    if(!line.trim()) continue;
    const secMatch = line.match(/^([a-z_]+):\s*$/);
    if(secMatch) { section = secMatch[1]; continue; }
    const kvMatch = line.match(/^\s+([a-z_]+):\s*(.+)$/);
    if(!kvMatch) continue;
    const [,key,rawVal] = kvMatch;
    const fullKey = section + "." + key;
    const cfgKey = YAML_TO_CFG[fullKey];
    if(!cfgKey) continue;
    // Parse value
    let val = rawVal.trim();
    if(val === "true" || val === "True") val = true;
    else if(val === "false" || val === "False") val = false;
    else if(val === "null" || val === "None") val = null;
    else if(val.startsWith("[") && val.endsWith("]")) {
      val = val.slice(1,-1).split(",").map(s=>s.trim()).filter(Boolean);
    } else if(val.startsWith("{") && val.endsWith("}")) {
      try {
        const inner = val.slice(1,-1).trim();
        if(!inner) { val = {}; } else {
          const obj = {};
          inner.split(",").forEach(p => {
            const [k,...rest] = p.split(":");
            let v = rest.join(":").trim();
            if(v==="true") v=true; else if(v==="false") v=false; else if(v==="null") v=null;
            else if(!isNaN(Number(v))) v=Number(v); else v=v.replace(/^"|"$/g,"");
            obj[k.trim()] = v;
          });
          val = obj;
        }
      } catch(e) { val = {}; }
    } else if(!isNaN(Number(val)) && val !== "") val = Number(val);
    result[cfgKey] = val;
  }
  // Derive downsample from df_frac
  if(result.dfFrac && result.dfFrac < 1 && result.dfFrac > 0) result.downsample = true;
  // Parse methods if string
  if(typeof result.fsMethods === "string") result.fsMethods = [result.fsMethods];
  // Parse forest_fixed_params (nested YAML block)
  const cfLines = yamlText.split("\n");
  let inForest = false, forestParams = {};
  for(const line of cfLines) {
    if(line.match(/^\s+forest_fixed_params:\s*$/)) { inForest = true; continue; }
    if(inForest) {
      const m = line.match(/^\s{4,}(\w+):\s*(.+)$/);
      if(m) {
        let v = m[2].trim();
        if(v==="true") v=true; else if(v==="false") v=false; else if(v==="null") v=null; else if(!isNaN(Number(v))) v=Number(v);
        forestParams[m[1]] = v;
      } else { inForest = false; }
    }
  }
  if(Object.keys(forestParams).length > 0) result.cfFixed = forestParams;
  // Parse shap_calculation_models
  const shapMatch = yamlText.match(/shap_calculation_models:\s*\[([^\]]+)\]/);
  if(shapMatch) result.shapModels = shapMatch[1].split(",").map(s=>s.trim()).filter(Boolean);
  // Parse feature_selection methods
  const fsMatch = yamlText.match(/methods:\s*\[([^\]]+)\]/);
  if(fsMatch) result.fsMethods = fsMatch[1].split(",").map(s=>s.trim()).filter(Boolean);

  return result;
};

const PData = ({cfg,set,setCfg,activeBase,setActiveBase,activeAddons,setActiveAddons}) => {
  const [tab,setTab] = useState("Dateipfade");
  const [tt,setTt] = useState(cfg.treatmentType||"binary");

  const basePresets = tt === "multi" ? MT_PRESETS : BT_PRESETS;

  const switchTreatment = (newTt) => {
    setTt(newTt);
    setActiveBase(null);
    const paths = {x_file:cfg.x_file,t_file:cfg.t_file,y_file:cfg.y_file,s_file:cfg.s_file,eval_x_file:cfg.eval_x_file,eval_t_file:cfg.eval_t_file,eval_y_file:cfg.eval_y_file,eval_s_file:cfg.eval_s_file,hasNaN:cfg.hasNaN,nanCols:cfg.nanCols,seed:cfg.seed,outputDir:cfg.outputDir,histScoreName:cfg.histScoreName,histScoreCol:cfg.histScoreCol,histScoreHigher:cfg.histScoreHigher};
    const addonOverlay = {};
    activeAddons.forEach(k => {const a=ADDON_PRESETS.find(x=>x.key===k);if(a)Object.assign(addonOverlay,a.cfg);});
    // Filter models: remove BT-only models when switching to multi
    const defaultModels = newTt==="multi" ? DEFAULT_CFG.models.filter(m=>!btOnly.has(m)) : DEFAULT_CFG.models;
    setCfg({...DEFAULT_CFG,...paths,...addonOverlay,models:defaultModels,treatmentType:newTt,refGroup:0,selMetric:newTt==="multi"?"policy_value":"qini"});
  };

  const applyBase = (p) => {
    const paths = {x_file:cfg.x_file,t_file:cfg.t_file,y_file:cfg.y_file,s_file:cfg.s_file,eval_x_file:cfg.eval_x_file,eval_t_file:cfg.eval_t_file,eval_y_file:cfg.eval_y_file,eval_s_file:cfg.eval_s_file,hasNaN:cfg.hasNaN,nanCols:cfg.nanCols,seed:cfg.seed,outputDir:cfg.outputDir,savePreds:cfg.savePreds,predsFormat:cfg.predsFormat,histScoreName:cfg.histScoreName,histScoreCol:cfg.histScoreCol,histScoreHigher:cfg.histScoreHigher};
    const addonOverlay = {};
    activeAddons.forEach(k => {const a=ADDON_PRESETS.find(x=>x.key===k);if(a)Object.assign(addonOverlay,a.cfg);});
    const merged = {...DEFAULT_CFG,...paths,treatmentType:tt,refGroup:cfg.refGroup||0,selMetric:tt==="multi"?"policy_value":"qini",...p.cfg,...addonOverlay};
    // Safety: filter out BT-only models if multi-treatment
    if(tt==="multi") merged.models = (merged.models||[]).filter(m=>!btOnly.has(m));
    setCfg(merged);
    setActiveBase(p.key);
  };

  const toggleAddon = (p) => {
    const next = new Set(activeAddons);
    if(next.has(p.key)) {
      next.delete(p.key);
      const reset = {};
      Object.keys(p.cfg).forEach(k => {reset[k]=DEFAULT_CFG[k];});
      setCfg(prev => ({...prev,...reset}));
    } else {
      next.add(p.key);
      setCfg(prev => ({...prev,...p.cfg}));
    }
    setActiveAddons(next);
  };

  const [importMode,setImportMode] = useState(false);
  const [importStatus,setImportStatus] = useState(null);
  const fileInputRef = useRef(null);

  const handleYamlImport = (text) => {
    try {
      const parsed = parseYamlToCfg(text);
      setCfg(parsed);
      setTt(parsed.treatmentType || "binary");
      setActiveBase(null);
      setActiveAddons(new Set());
      setImportStatus({ok:true, msg:"Konfiguration erfolgreich geladen – " + Object.keys(parsed).length + " Felder übernommen."});
      // Importierte Config auch ans Backend senden
      fetch("./api/import-config", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({yaml_text: text})
      }).catch(()=>{});
    } catch(e) {
      setImportStatus({ok:false, msg:"Fehler beim Parsen: " + e.message});
    }
  };

  return (
    <>
      <Sec title="Analysedaten">
        <Info>Lade vorbereitete X/T/Y/S-Dateien. Falls von der Datenvorbereitung erzeugt, sind die Pfade bereits eingetragen.</Info>
        <Tabs tabs={["Dateipfade","Datei-Upload"]} active={tab} onSelect={setTab}/>
        {tab==="Dateipfade" ? (
          <Row><Col>
            <Inp label="X-Datei (Features)" placeholder="data/processed/X.parquet" value={cfg.x_file} onChange={v=>set({...cfg,x_file:v})}/>
            <Inp label="T-Datei (Treatment)" placeholder="data/processed/T.parquet" value={cfg.t_file} onChange={v=>set({...cfg,t_file:v})}/>
          </Col><Col>
            <Inp label="Y-Datei (Outcome)" placeholder="data/processed/Y.parquet" value={cfg.y_file} onChange={v=>set({...cfg,y_file:v})}/>
            <Inp label="S-Datei (Hist. Score, optional)" placeholder="data/processed/S.parquet" value={cfg.s_file} onChange={v=>set({...cfg,s_file:v})}/>
          </Col></Row>
        ) : (
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[{label:"X-Datei (Features)",key:"x_file"},{label:"T-Datei (Treatment)",key:"t_file"},{label:"Y-Datei (Outcome)",key:"y_file"},{label:"S-Datei (optional)",key:"s_file"}].map(f => {
              const uploadFile = async (file) => {
                if(!file) return;
                const fd = new FormData();
                fd.append("file", file);
                try {
                  const res = await fetch("./api/upload", {method:"POST", body: fd});
                  const data = await res.json();
                  if(data.status === "done" && data.path) {
                    set({...cfg, [f.key]: data.path});
                  } else {
                    alert("Upload fehlgeschlagen: " + (data.message || "Unbekannter Fehler"));
                  }
                } catch(e) {
                  alert("Upload fehlgeschlagen: " + (e.message || "Server nicht erreichbar. Prüfe die Verbindung in der Sidebar."));
                }
              };
              return (
              <div key={f.key}
                onClick={()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".csv,.parquet,.sas7bdat";inp.onchange=e=>uploadFile(e.target.files?.[0]);inp.click()}}
                onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#9B111E";e.currentTarget.style.background="#FDF2F3"}}
                onDragLeave={e=>{e.currentTarget.style.borderColor="#d4b5b8";e.currentTarget.style.background="#faf8f8"}}
                onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor="#d4b5b8";e.currentTarget.style.background="#faf8f8";uploadFile(e.dataTransfer.files?.[0])}}
                style={{border:"2px dashed #d4b5b8",borderRadius:10,padding:"24px 16px",textAlign:"center",background:cfg[f.key]?"#f0fdf4":"#faf8f8",cursor:"pointer",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#9B111E";e.currentTarget.style.background="#FDF2F3"}} onMouseLeave={e=>{e.currentTarget.style.borderColor=cfg[f.key]?"#86efac":"#d4b5b8";e.currentTarget.style.background=cfg[f.key]?"#f0fdf4":"#faf8f8"}}>
                <div style={{fontWeight:600,color:cfg[f.key]?"#1a7f37":"#6B0D15",fontSize:13}}>{cfg[f.key] ? "✓ " + cfg[f.key].split("/").pop() : f.label}</div>
                <div style={{fontSize:11,color:"#999",marginTop:3}}>{cfg[f.key] ? "Klicken zum Ersetzen" : "CSV / Parquet – Klicken oder Ziehen"}</div>
              </div>
            );})}
          </div>
        )}
        {cfg.validateOn==="external" && (<>
          <Divider/>
          <div style={{fontSize:13.5,fontWeight:600,color:C.dark,marginBottom:6}}>Evaluationsdaten (separater Datensatz)</div>
          <Info>Trainiert wird auf den obigen Daten. Evaluiert wird auf den hier angegebenen Daten. Kein Data-Leakage – Preprocessing wurde getrennt auf den Trainingsdaten gefittet.</Info>
          {tab==="Dateipfade" ? (
            <Row><Col>
              <Inp label="Eval X-Datei" placeholder="data/processed/X_eval.parquet" value={cfg.eval_x_file||""} onChange={v=>set({...cfg,eval_x_file:v})}/>
              <Inp label="Eval T-Datei" placeholder="data/processed/T_eval.parquet" value={cfg.eval_t_file||""} onChange={v=>set({...cfg,eval_t_file:v})}/>
            </Col><Col>
              <Inp label="Eval Y-Datei" placeholder="data/processed/Y_eval.parquet" value={cfg.eval_y_file||""} onChange={v=>set({...cfg,eval_y_file:v})}/>
              <Inp label="Eval S-Datei (optional)" placeholder="data/processed/S_eval.parquet" value={cfg.eval_s_file||""} onChange={v=>set({...cfg,eval_s_file:v})}/>
            </Col></Row>
          ) : (
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[{label:"Eval X-Datei (Features)",key:"eval_x_file"},{label:"Eval T-Datei (Treatment)",key:"eval_t_file"},{label:"Eval Y-Datei (Outcome)",key:"eval_y_file"},{label:"Eval S-Datei (optional)",key:"eval_s_file"}].map(f => {
                const uploadEvalFile = async (file) => {
                  if(!file) return;
                  const fd = new FormData();
                  fd.append("file", file);
                  try {
                    const res = await fetch("./api/upload", {method:"POST", body: fd});
                    const data = await res.json();
                    if(data.status === "done" && data.path) {
                      set({...cfg, [f.key]: data.path});
                    } else {
                      alert("Upload fehlgeschlagen: " + (data.message || "Unbekannter Fehler"));
                    }
                  } catch(e) {
                    alert("Upload fehlgeschlagen: " + (e.message || "Server nicht erreichbar. Prüfe die Verbindung in der Sidebar."));
                  }
                };
                return (
                <div key={f.key}
                  onClick={()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".csv,.parquet,.sas7bdat";inp.onchange=e=>uploadEvalFile(e.target.files?.[0]);inp.click()}}
                  onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#D4A853";e.currentTarget.style.background="#fffbeb"}}
                  onDragLeave={e=>{e.currentTarget.style.borderColor="#d4b5b8";e.currentTarget.style.background="#faf8f8"}}
                  onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor="#d4b5b8";e.currentTarget.style.background="#faf8f8";uploadEvalFile(e.dataTransfer.files?.[0])}}
                  style={{border:"2px dashed #d4b5b8",borderRadius:10,padding:"24px 16px",textAlign:"center",background:cfg[f.key]?"#f0fdf4":"#faf8f8",cursor:"pointer",transition:"all 0.15s"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#D4A853";e.currentTarget.style.background="#fffbeb"}} onMouseLeave={e=>{e.currentTarget.style.borderColor=cfg[f.key]?"#86efac":"#d4b5b8";e.currentTarget.style.background=cfg[f.key]?"#f0fdf4":"#faf8f8"}}>
                  <div style={{fontWeight:600,color:cfg[f.key]?"#1a7f37":"#7a5a00",fontSize:13}}>{cfg[f.key] ? "✓ " + cfg[f.key].split("/").pop() : f.label}</div>
                  <div style={{fontSize:11,color:"#999",marginTop:3}}>{cfg[f.key] ? "Klicken zum Ersetzen" : "CSV / Parquet – Klicken oder Ziehen"}</div>
                </div>
              );})}
            </div>
          )}
        </>)}
      </Sec>
      <Sec title="Historischer Score (Benchmark)">
        <Info>Optional: Konfiguration für den historischen Score (S-Datei). Wird für den Benchmark-Vergleich genutzt, wenn die S-Datei angegeben ist.</Info>
        {cfg.s_file ? (<>
          <Row>
            <Col><Inp label="Score-Name" value={cfg.histScoreName||"historical_score"} onChange={v=>set({...cfg,histScoreName:v})} help="Bezeichnung im Report"/></Col>
            <Col><Inp label="Score-Spalte" value={cfg.histScoreCol||"S"} onChange={v=>set({...cfg,histScoreCol:v})} help="Spaltenname in der S-Datei"/></Col>
            <Col><Toggle label="Higher is better" checked={cfg.histScoreHigher!==false} onChange={v=>set({...cfg,histScoreHigher:v})} help="Score-Richtung: höher = besser (z.B. Conversion-Wahrscheinlichkeit)"/></Col>
          </Row>
        </>) : <Info type="warn">Keine S-Datei angegeben. Historischer Score wird nicht verwendet.</Info>}
      </Sec>

      <Sec title="Config importieren" accent="#D4A853">
        <Info>Lade eine bestehende <strong>config.yml</strong> hoch, um alle Einstellungen automatisch zu übernehmen. Alternativ kannst du unten manuell über Vorlagen konfigurieren.</Info>
        <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
          <div
            onClick={()=>fileInputRef.current?.click()}
            onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#D4A853";e.currentTarget.style.background="#fffbf0"}}
            onDragLeave={e=>{e.currentTarget.style.borderColor="#d4b5b8";e.currentTarget.style.background="#faf8f8"}}
            onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor="#d4b5b8";e.currentTarget.style.background="#faf8f8";const f=e.dataTransfer.files[0];if(f){const r=new FileReader();r.onload=ev=>handleYamlImport(ev.target.result);r.onerror=()=>setImportStatus({ok:false,msg:"Datei konnte nicht gelesen werden."});r.readAsText(f)}}}
            style={{flex:1,border:"2px dashed #d4b5b8",borderRadius:12,padding:"28px 20px",textAlign:"center",background:"#faf8f8",cursor:"pointer",transition:"all 0.2s"}}
          >
            <div style={{fontSize:28,marginBottom:6,opacity:0.4}}>📄</div>
            <div style={{fontSize:13.5,fontWeight:600,color:C.dark}}>config.yml hierher ziehen</div>
            <div style={{fontSize:11.5,color:C.textMuted,marginTop:4}}>oder klicken zum Durchsuchen</div>
            <input ref={fileInputRef} type="file" accept=".yml,.yaml" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(f){const r=new FileReader();r.onload=ev=>handleYamlImport(ev.target.result);r.onerror=()=>setImportStatus({ok:false,msg:"Datei konnte nicht gelesen werden."});r.readAsText(f)}}}/>
          </div>
          <div style={{textAlign:"center",color:C.textMuted,fontSize:12,fontWeight:600,padding:"36px 8px"}}>oder</div>
          <div
            onClick={()=>{setImportMode(!importMode)}}
            style={{padding:"28px 24px",border:`1.5px solid ${C.border}`,borderRadius:12,background:"#fff",cursor:"pointer",textAlign:"center",minWidth:140,transition:"all 0.15s"}}
          >
            <div style={{fontSize:28,marginBottom:6,opacity:0.4}}>📋</div>
            <div style={{fontSize:13.5,fontWeight:600,color:C.dark}}>YAML einfügen</div>
            <div style={{fontSize:11.5,color:C.textMuted,marginTop:4}}>aus Zwischenablage</div>
          </div>
        </div>
        {importMode && (
          <div style={{marginTop:14}}>
            <textarea
              placeholder="mlflow:\n  experiment_name: rubin\n..."
              rows={8}
              style={{width:"100%",fontFamily:"'JetBrains Mono',monospace",fontSize:12,padding:"14px 16px",border:`1.5px solid ${C.border}`,borderRadius:10,resize:"vertical",background:"#1e1e2e",color:"#cdd6f4",outline:"none",boxSizing:"border-box",lineHeight:1.6}}
              onFocus={e=>{e.target.style.borderColor=C.gold}}
              onBlur={e=>{e.target.style.borderColor=C.border}}
              id="yaml-paste"
            />
            <div style={{marginTop:8}}>
              <Btn small onClick={()=>{const el=document.getElementById("yaml-paste");if(el?.value)handleYamlImport(el.value)}}>Config übernehmen</Btn>
            </div>
          </div>
        )}
        {importStatus && (
          <div style={{marginTop:10}}>
            <Info type={importStatus.ok?"success":"error"}>{importStatus.msg}</Info>
          </div>
        )}
      </Sec>

      <Sec title="1. Treatment-Typ">
        <Info>Grundlegende Entscheidung: Binary Treatment (T in {"{0,1}"}) oder Multi-Treatment (T in {"{0,1,...,K-1}"}). Bestimmt, welche Modelle und Metriken verfügbar sind.</Info>
        <div style={{display:"flex",gap:10,marginTop:10}}>
          {[{k:"binary",l:"Binary Treatment",d:"T in {0,1} – 7 Modelle verfügbar"},{k:"multi",l:"Multi-Treatment",d:"T in {0,...,K-1} – nur DML-Modelle"}].map(o => {
            const active = tt === o.k;
            return (
              <button key={o.k} onClick={()=>switchTreatment(o.k)} style={{flex:1,padding:"20px 22px",borderRadius:12,border:active?"2px solid #9B111E":"1.5px solid #e0d6d7",background:active?"#FDF2F3":"#faf6f6",cursor:"pointer",textAlign:"left",transition:"all 0.2s"}}
                onMouseEnter={e=>{if(!active)e.currentTarget.style.borderColor="#c4343f"}}
                onMouseLeave={e=>{if(!active)e.currentTarget.style.borderColor="#e0d6d7"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:20,height:20,borderRadius:10,border:active?"5px solid #9B111E":"2px solid #ccc",background:active?"#fff":"#fff",flexShrink:0}}/>
                  <div>
                    <div style={{fontSize:15,fontWeight:700,color:active?"#6B0D15":"#333"}}>{o.l}</div>
                    <div style={{fontSize:12,color:"#888",marginTop:2}}>{o.d}</div>
                  </div>
                </div>
              </button>
            );
          })}
        </div>
        {tt==="multi" && <div style={{marginTop:8}}><Row><Col><Inp label="Reference Group" type="number" value={cfg.refGroup} onChange={v=>set({...cfg,refGroup:v})} help="Control-Baseline (typisch 0)"/></Col></Row></div>}
      </Sec>

      <Sec title="2. Basis-Vorlage">
        <Info>Wähle eine Vorlage als Startpunkt. Ein Wechsel setzt Kerneinstellungen zurück, behält aber Datenpfade und aktive Add-ons.</Info>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
          {basePresets.map((p,i) => {
            const active = activeBase === p.key;
            const isLastOdd = basePresets.length % 2 === 1 && i === basePresets.length - 1;
            return (
              <button key={p.key} onClick={()=>applyBase(p)}
                style={{display:"flex",alignItems:"flex-start",gap:10,padding:"14px 18px",background:active?"#FDF2F3":"#faf6f6",border:active?"2px solid #9B111E":"1.5px solid #e0d6d7",borderRadius:12,cursor:"pointer",textAlign:"left",transition:"all 0.15s",gridColumn:isLastOdd?"1 / -1":undefined,maxWidth:isLastOdd?"calc(50% - 5px)":undefined,justifySelf:isLastOdd?"center":undefined}}
                onMouseEnter={e=>{if(!active){e.currentTarget.style.borderColor="#c4343f";e.currentTarget.style.background="#faf8f8"}}}
                onMouseLeave={e=>{if(!active){e.currentTarget.style.borderColor="#e0d6d7";e.currentTarget.style.background="#faf6f6"}}}>
                <div style={{width:12,height:12,borderRadius:6,border:active?"3px solid #9B111E":"2px solid #ccc",background:active?"#9B111E":"#fff",marginTop:4,flexShrink:0}}/>
                <div>
                  <div style={{fontSize:13.5,fontWeight:600,color:active?"#6B0D15":"#333"}}>{p.label}</div>
                  <div style={{fontSize:11.5,color:"#888",marginTop:1,lineHeight:1.4}}>{p.desc}</div>
                </div>
              </button>
            );
          })}
        </div>
        {activeBase && <div style={{marginTop:8}}><Info type="success"><strong>{basePresets.find(p=>p.key===activeBase)?.label}</strong> als Basis geladen.</Info></div>}
      </Sec>

      <Sec title="3. Add-ons" accent="#D4A853">
        <Info>Add-ons ergänzen die Basis, ohne sie zu überschreiben. Mehrfachauswahl möglich.</Info>
        <div style={{display:"grid",gridTemplateColumns:ADDON_PRESETS.length<=3?"repeat("+ADDON_PRESETS.length+",1fr)":"1fr 1fr",gap:10,marginTop:10}}>
          {ADDON_PRESETS.map((p,i) => {
            const active = activeAddons.has(p.key);
            const isLastOdd = ADDON_PRESETS.length > 3 && ADDON_PRESETS.length % 2 === 1 && i === ADDON_PRESETS.length - 1;
            return (
              <button key={p.key} onClick={()=>toggleAddon(p)}
                style={{display:"flex",alignItems:"flex-start",gap:10,padding:"14px 18px",background:active?"#fffbeb":"#faf6f6",border:active?"2px solid #D4A853":"1.5px solid #e0d6d7",borderRadius:12,cursor:"pointer",textAlign:"left",transition:"all 0.15s",gridColumn:isLastOdd?"1 / -1":undefined,maxWidth:isLastOdd?"calc(50% - 5px)":undefined,justifySelf:isLastOdd?"center":undefined}}>
                <div style={{width:18,height:18,borderRadius:5,border:active?"2px solid #D4A853":"2px solid #ccc",background:active?"#D4A853":"#fff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                  {active && <span style={{color:"#fff",fontSize:11,fontWeight:700}}>✓</span>}
                </div>
                <div>
                  <div style={{fontSize:13.5,fontWeight:600,color:active?"#7a5a00":"#333"}}>{p.label}</div>
                  <div style={{fontSize:11.5,color:"#888",marginTop:1,lineHeight:1.4}}>{p.desc}</div>
                </div>
              </button>
            );
          })}
        </div>
      </Sec>

      <Sec title="Datenqualität">
        {cfg.hasNaN && (cfg.nanCols||[]).length > 0 && (
          <Info type="warn"><strong>Fehlende Werte erkannt</strong> in {(cfg.nanCols||[]).length} Spalten: <span style={{fontFamily:"monospace"}}>{(cfg.nanCols||[]).join(", ")}</span>. CausalForestDML und die Feature-Selektionsmethode causal_forest (GRF) werden automatisch übersprungen. Du kannst in der Datenvorbereitung eine NaN-Auffüll-Methode wählen, um alle Modelle nutzen zu können.</Info>
        )}
        {cfg.hasNaN && (cfg.nanCols||[]).length === 0 && (
          <Info type="warn"><strong>Fehlende Werte in den Daten.</strong> CausalForestDML und causal_forest (GRF) werden automatisch übersprungen.</Info>
        )}
        {!cfg.hasNaN && (
          <Info type="success">Keine fehlenden Werte – alle Modelle sind verfügbar.</Info>
        )}
        <div style={{fontSize:11.5,color:"#888",marginTop:6}}>Der NaN-Status wird automatisch erkannt, wenn Spalten in der Datenvorbereitung geladen werden. Ohne Datenvorbereitung kannst du den Status manuell setzen:</div>
        <div style={{marginTop:6}}>
          <Toggle label="Fehlende Werte manuell markieren" checked={cfg.hasNaN||false} onChange={v=>set({...cfg,hasNaN:v})} help="Nur nötig, falls die Datenvorbereitung nicht genutzt wurde"/>
        </div>
      </Sec>
    </>
  );
};

// Remaining pages (Config, Models, Selection, Explain) - compact
const PConfig = ({cfg,set}) => (<>
  <Sec title="Experiment">
    <Info>Jeder Analyse-Lauf wird als MLflow-Experiment protokolliert. Der Name erscheint im MLflow-UI und im HTML-Report.</Info>
    <Row>
      <Col><Inp label="Experiment-Name" value={cfg.expName} onChange={v=>set({...cfg,expName:v})} icon="E" help="Wird als MLflow experiment_name und im Report-Titel verwendet"/></Col>
      <Col><Inp label="Random Seed" type="number" value={cfg.seed} onChange={v=>set({...cfg,seed:v})} icon="#" help="Reproduzierbarkeit: gleicher Seed = gleiche Ergebnisse bei identischen Daten"/></Col>
    </Row>
    {cfg.dpRunName && <div style={{fontSize:11.5,color:"#7a5a00",background:"#fffbeb",border:"1px solid #d4a853",borderRadius:8,padding:"6px 12px",marginTop:6}}>
      <strong>Datenaufbereitung:</strong> MLflow-Run „{cfg.dpRunName}" wurde automatisch übernommen. Experiment-Name „{cfg.expName}" stammt aus der Datenaufbereitung.
    </div>}
    <div style={{marginTop:10}}>
      <div style={{fontSize:12,fontWeight:600,color:"#57606a",marginBottom:8}}>Parallelisierungs-Level</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {[{v:1,l:"Minimal",d:"1 Kern, alles sequentiell. Sicher auf jeder Maschine, minimaler RAM."},{v:2,l:"Moderat",d:"Alle Kerne pro Fit, Folds und Trials sequentiell. Guter Kompromiss."},{v:3,l:"Hoch",d:"Kerne aufgeteilt, Folds und Trials parallel. DRTester nur Champion + Challenger. Schneller, mehr RAM."},{v:4,l:"Maximum",d:"Max. Folds und Trials parallel. DRTester nur Champion. Schnellste Laufzeit, höchster RAM."}].map(o=>{
          const active=(cfg.parallelLevel||2)===o.v;
          return(<button key={o.v} onClick={()=>set({...cfg,parallelLevel:o.v})} style={{flex:"1 1 140px",padding:"10px 14px",borderRadius:10,border:active?"2px solid #9B111E":"1.5px solid #e0d6d7",background:active?"#FDF2F3":"#fff",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:13,fontWeight:active?700:500,color:active?"#6B0D15":"#24292f"}}>{o.l}</span><span style={{fontSize:11,color:"#999",marginLeft:"auto"}}>Level {o.v}</span></div>
            <div style={{fontSize:11,color:"#57606a",marginTop:4,lineHeight:1.4}}>{o.d}</div>
          </button>);
        })}
      </div>
    </div>
  </Sec>

  <Sec title="Validierungsstrategie">
    <Info>Bestimmt, wie die Modelle evaluiert werden. <strong>Cross-Validation</strong> (Standard) nutzt alle Daten effizient über K-Fold Out-of-Fold-Vorhersagen. <strong>Externer Datensatz</strong> trainiert auf den konfigurierten Daten und evaluiert auf einem separaten, leakage-freien Datensatz. Mit <strong>Train Many, Evaluate One</strong> (via Eval-Maske) werden alle Daten zum Training genutzt, aber Metriken nur auf einer ausgewählten Datei berechnet.</Info>
    <Row>
      <Col>
        <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
          {[{k:"cross",l:"Cross-Validation",d:"K-Fold: Jede Beobachtung wird genau einmal als Validierung genutzt."},{k:"external",l:"Externer Datensatz",d:"Separater Datensatz für Evaluation. Training nutzt alle konfigurierten Daten."}].map(o => {
            const active = cfg.validateOn === o.k;
            return (
              <button key={o.k} onClick={()=>set({...cfg,validateOn:o.k})} style={{flex:1,minWidth:180,padding:"12px 16px",borderRadius:10,border:active?"2px solid "+C.ruby:"1.5px solid "+C.border,background:active?C.rose:"#fff",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:14,height:14,borderRadius:7,border:active?"4px solid "+C.ruby:"2px solid #ccc",background:"#fff",flexShrink:0}}/>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:active?C.dark:"#333"}}>{o.l}</div>
                    <div style={{fontSize:11,color:C.textMuted,marginTop:2,lineHeight:1.4}}>{o.d}</div>
                  </div>
                </div>
              </button>
            );
          })}
        </div>
      </Col>
    </Row>
    <Row>
      <Col>

// ── Tuning Plan (mirrors tuning_optuna.py logic) ──
const rolesForModel = m => {
  const n = m.toLowerCase();
  if(n==="slearner") return [{role:"overall_model",label:"Outcome-Regression (mit T)",sig:"outcome_regression__reg__with_t__all__Y"}];
  if(n==="tlearner") return [{role:"models",label:"Outcome-Regression (pro Gruppe)",sig:"grouped_outcome_regression__reg__no_t__group__Y"}];
  if(n==="xlearner") return [
    {role:"models",label:"Outcome-Regression (pro Gruppe)",sig:"grouped_outcome_regression__reg__no_t__group__Y"},
    {role:"cate_models",label:"Pseudo-Effekt (Regressor)",sig:"pseudo_effect__reg__no_t__group__D"},
    {role:"propensity_model",label:"Propensity",sig:"propensity__clf__no_t__all__T"},
  ];
  if(n==="drlearner") return [
    {role:"model_propensity",label:"Propensity",sig:"propensity__clf__no_t__all__T"},
    {role:"model_regression",label:"Outcome-Regression",sig:"outcome_regression__reg__no_t__all__Y"},
  ];
  if(["nonparamdml","paramdml","causalforestdml"].includes(n)) return [
    {role:"model_y",label:"Outcome (Classifier)",sig:"outcome__clf__no_t__all__Y"},
    {role:"model_t",label:"Propensity (Classifier)",sig:"propensity__clf__no_t__all__T"},
  ];
  return [];
};

const computeTuningPlan = (models, perRole, perLearner) => {
  const tasks = {};
  (models || []).forEach(m => {
    rolesForModel(m).forEach(({role, label, sig}) => {
      let key = sig;
      if(perRole) key += "__" + role.toLowerCase();
      if(perLearner) key += "__" + m.toLowerCase();
      if(!tasks[key]) tasks[key] = {key, label, sig, models: [], roles: []};
      tasks[key].models.push(m);
      tasks[key].roles.push({model: m, role});
    });
  });
  return Object.values(tasks);
};

const TuningPlanPreview = ({models, perRole, perLearner, trials, cv}) => {
  const plan = computeTuningPlan(models, perRole, perLearner);
  const nTrials = trials || 30;
  const nCv = cv || 3;
  const totalStudies = plan.length;
  const totalTrials = totalStudies * nTrials;
  const totalFits = totalTrials * nCv;
  if(totalStudies === 0) return <Info type="warn">Keine Modelle ausgewählt – kein Tuning nötig.</Info>;

  const sigColors = {"outcome":"#9B111E","outcome_regression":"#d97706","propensity":"#D4A853","grouped_outcome":"#6366f1","grouped_outcome_regression":"#7c3aed","pseudo_effect":"#1a7f37"};
  const sigLabel = sig => {
    if(sig.startsWith("outcome_regression")) return "Outcome (Regressor)";
    if(sig.startsWith("outcome")) return "Outcome (Classifier)";
    if(sig.startsWith("propensity")) return "Propensity";
    if(sig.startsWith("grouped_outcome_regression")) return "Grouped Outcome (Regressor)";
    if(sig.startsWith("grouped_outcome")) return "Grouped Outcome (Classifier)";
    if(sig.startsWith("pseudo_effect")) return "Pseudo-Effekt";
    return sig;
  };

  return (
    <div>
      <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
        <div style={{padding:"8px 16px",background:"linear-gradient(135deg,#6B0D15,#9B111E)",borderRadius:8,color:"#fff"}}>
          <div style={{fontSize:22,fontWeight:700}}>{totalStudies}</div>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:0.5,opacity:0.7}}>Optuna-Studies</div>
        </div>
        <div style={{padding:"8px 16px",background:"#FDF2F3",borderRadius:8,border:"1px solid #e0d6d7"}}>
          <div style={{fontSize:22,fontWeight:700,color:"#6B0D15"}}>{totalTrials}</div>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:0.5,color:"#888"}}>Trials gesamt</div>
        </div>
        <div style={{padding:"8px 16px",background:"#FDF2F3",borderRadius:8,border:"1px solid #e0d6d7"}}>
          <div style={{fontSize:22,fontWeight:700,color:"#C4343F"}}>{totalFits.toLocaleString()}</div>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:0.5,color:"#888"}}>Modell-Fits</div>
        </div>
        <div style={{padding:"8px 16px",background:"#faf6f6",borderRadius:8,border:"1px solid #ede6e7"}}>
          <div style={{fontSize:22,fontWeight:700,color:"#333"}}>{nCv}</div>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:0.5,color:"#888"}}>CV-Folds</div>
        </div>
        <div style={{padding:"8px 16px",background:"#faf6f6",borderRadius:8,border:"1px solid #ede6e7"}}>
          <div style={{fontSize:22,fontWeight:700,color:"#333"}}>{(models||[]).length}</div>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:0.5,color:"#888"}}>Modelle</div>
        </div>
      </div>
      <div style={{fontSize:11.5,color:"#888",marginBottom:10}}>
        Berechnung: {totalStudies} Studies × {nTrials} Trials × {nCv} CV-Folds = <strong style={{color:"#C4343F"}}>{totalFits.toLocaleString()} Modell-Fits</strong>
      </div>

      <div style={{border:"1px solid #ede6e7",borderRadius:8,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"36px 1fr 1fr 60px 60px 70px",fontSize:11,fontWeight:600,padding:"8px 14px",background:"#6B0D15",color:"#fff"}}>
          <span>#</span><span>Tuning-Task</span><span>Genutzt von</span><span>Trials</span><span>Folds</span><span>Fits</span>
        </div>
        {plan.map((t,i) => {
          const family = t.sig.split("__")[0];
          const col = sigColors[family] || "#888";
          const shared = t.roles.length > 1;
          const rowFits = nTrials * nCv;
          return (
            <div key={t.key} style={{display:"grid",gridTemplateColumns:"36px 1fr 1fr 60px 60px 70px",padding:"7px 14px",borderBottom:"1px solid #f5f0f0",background:i%2===0?"#fff":"#fdfbfb",alignItems:"center",fontSize:12}}>
              <span style={{color:"#bbb",fontFamily:"monospace",fontWeight:600}}>{i+1}</span>
              <div>
                <span style={{display:"inline-block",width:8,height:8,borderRadius:4,background:col,marginRight:6}}/>
                <span style={{fontWeight:500}}>{sigLabel(t.sig)}</span>
                {shared && <span style={{fontSize:10,color:"#1a7f37",marginLeft:6,fontWeight:600}}>shared</span>}
              </div>
              <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                {t.roles.map((r,j) => (
                  <span key={j} style={{fontSize:10.5,background:"#f5f0f0",padding:"1px 7px",borderRadius:10,color:"#555"}}>
                    {r.model}<span style={{color:"#ccc"}}>.</span>{r.role}
                  </span>
                ))}
              </div>
              <span style={{fontFamily:"monospace",color:"#9B111E",fontWeight:600}}>{nTrials}</span>
              <span style={{fontFamily:"monospace",color:"#888"}}>{nCv}</span>
              <span style={{fontFamily:"monospace",color:"#C4343F",fontWeight:600}}>{rowFits}</span>
            </div>
          );
        })}
      </div>
      {!perRole && !perLearner && totalStudies < (models||[]).length * 2 && (
        <div style={{fontSize:11.5,color:"#888",marginTop:8,fontStyle:"italic"}}>
          Tasks mit gleicher Signatur werden geteilt – {(models||[]).reduce((a,m)=>a+rolesForModel(m).length,0) - totalStudies} Tuning-Läufe eingespart.
        </div>
      )}
    </div>
  );
};

// ── Final-Model Tuning Plan ──
const FinalTuningPlanPreview = ({models, fmtEnabled, fmtModels, fmtSingleFold, fmtTrials, fmtCv, cfTune}) => {
  const nTrials = fmtTrials || 20;
  const nCv = fmtCv || 3;
  const eligible = (models||[]).filter(m => ["NonParamDML","DRLearner"].includes(m) && (fmtModels === undefined || fmtModels === null || fmtModels.includes(m)));
  const hasCF = (models||[]).includes("CausalForestDML");

  const rows = [];
  eligible.forEach(m => {
    if(!fmtEnabled) return;
    const mn = m.toLowerCase();
    if(mn === "nonparamdml") {
      rows.push({model:m, method:"RScorer", studies:1, trials:nTrials, fitsPerTrial:1, totalFits:nTrials, note:"RScorer wird einmal vorab gefittet (berechnet Residuen mit CV). Danach 1 Kandidaten-Fit pro Trial, Bewertung über vorberechnete Residuen."});
    }
    if(mn === "drlearner") {
      const drCv = fmtSingleFold ? 1 : nCv;
      const drMethod = fmtSingleFold ? "score() Single-Fold" : "score() + CV";
      const drNote = fmtSingleFold
        ? "Single-Fold: 1 Fit pro Trial statt " + nCv + " CV-Folds. Schneller, etwas verrauschtere Metrik."
        : "Kein RScorer verfügbar (andere Nuisance-Struktur). Jeder Trial fittet " + nCv + " CV-Folds mit je einem vollständigen DRLearner + score().";
      rows.push({model:m, method:drMethod, studies:1, trials:nTrials, fitsPerTrial:drCv, totalFits:nTrials*drCv, note:drNote});
    }
  });
  if(hasCF && cfTune) {
    // EconML auto grid: min_weight_fraction_leaf[2] × max_depth[3] × min_var_fraction_leaf[2] = 12 combos
    // Each combo trains a forest with 100 trees + RScorer evaluation
    const gridCombos = 2 * 3 * 2; // 12
    rows.push({model:"CausalForestDML", method:"EconML tune() Grid", studies:0, trials:gridCombos, fitsPerTrial:1, totalFits:gridCombos, note:"Grid-Search: min_weight_fraction_leaf(2) × max_depth(3) × min_var_fraction_leaf(2) = 12 Kombinationen, je 100 Bäume + RScorer"});
  }

  const totalStudies = rows.filter(r=>r.studies>0).length;
  const totalFits = rows.reduce((a,r)=>a+r.totalFits,0);

  if(rows.length === 0) {
    const noEligible = (models||[]).filter(m=>["NonParamDML","DRLearner","CausalForestDML"].includes(m)).length === 0;
    return <Info type="warn">{noEligible ? "Kein Modell mit Final-Tuning-Unterstützung ausgewählt (nur NonParamDML, DRLearner, CausalForestDML)." : "Final-Model-Tuning ist deaktiviert."}</Info>;
  }

  return (
    <div>
      <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
        <div style={{padding:"8px 16px",background:"linear-gradient(135deg,#b8860b,#D4A853)",borderRadius:8,color:"#fff"}}>
          <div style={{fontSize:22,fontWeight:700}}>{totalStudies}</div>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:0.5,opacity:0.7}}>Optuna-Studies</div>
        </div>
        <div style={{padding:"8px 16px",background:"#fffbeb",borderRadius:8,border:"1px solid #D4A853"}}>
          <div style={{fontSize:22,fontWeight:700,color:"#b8860b"}}>{totalFits.toLocaleString()}</div>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:0.5,color:"#888"}}>Modell-Fits</div>
        </div>
        {cfTune && hasCF && (
          <div style={{padding:"8px 16px",background:"#faf7f7",borderRadius:8,border:"1px solid #ede6e7"}}>
            <div style={{fontSize:22,fontWeight:700,color:"#333"}}>12</div>
            <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:0.5,color:"#888"}}>Grid-Kombis</div>
          </div>
        )}
      </div>

      <div style={{border:"1px solid #ede6e7",borderRadius:8,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 110px 60px 50px 70px",fontSize:11,fontWeight:600,padding:"8px 14px",background:"#b8860b",color:"#fff"}}>
          <span>Modell</span><span>Methode</span><span>Trials</span><span>CV</span><span>Fits</span>
        </div>
        {rows.map((r,i) => (
          <div key={r.model} style={{borderBottom:"1px solid #f5f0f0",background:i%2===0?"#fff":"#fdfbfb"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 110px 60px 50px 70px",padding:"8px 14px",alignItems:"center",fontSize:12.5}}>
              <span style={{fontWeight:600,color:"#333"}}>{r.model}</span>
              <span style={{fontSize:11,color:"#7a5a00",fontWeight:500}}>{r.method}</span>
              <span style={{fontFamily:"monospace",color:"#b8860b",fontWeight:600}}>{r.trials||"–"}</span>
              <span style={{fontFamily:"monospace",color:"#888"}}>{r.fitsPerTrial>1?r.fitsPerTrial:"–"}</span>
              <span style={{fontFamily:"monospace",color:"#b8860b",fontWeight:700}}>{r.totalFits}</span>
            </div>
            <div style={{fontSize:10.5,color:"#999",padding:"0 14px 6px",marginTop:-2}}>{r.note}</div>
          </div>
        ))}
      </div>
      {fmtEnabled && eligible.length > 0 && (
        <div style={{fontSize:11.5,color:"#888",marginTop:8}}>
          Berechnung: {eligible.map(m => {
            const r = rows.find(x=>x.model===m);
            if(!r) return null;
            if(m === "NonParamDML") return `${m}: ${nTrials} Trials × 1 = ${nTrials} Fits`; const drCvCalc = fmtSingleFold ? 1 : nCv; return `${m}: ${nTrials} Trials × ${drCvCalc} = ${nTrials*drCvCalc} Fits`;
          }).filter(Boolean).join(" + ")}
          {cfTune && hasCF ? " + CausalForestDML: 12 Grid-Kombinationen" : ""}
          {" = "}<strong style={{color:"#b8860b"}}>{totalFits} Fits</strong>
        </div>
      )}
    </div>
  );
};

const PModels = ({cfg,set,sp,setSp,spFmt,setSpFmt}) => {
  const mt=cfg.treatmentType==="multi";const nanB=cfg.hasNaN?new Set(["CausalForestDML"]):new Set();const mtB=mt?btOnly:new Set();const av=allModels.filter(m=>!mtB.has(m)&&!nanB.has(m));
  return (<><Sec title="Kausale Modelle">{mt&&<Info type="warn"><strong>Multi-Treatment:</strong> Nur DML-Modelle verfügbar.</Info>}{cfg.hasNaN&&<Info type="warn"><strong>Fehlende Werte:</strong> CausalForestDML nicht verfügbar (GRF).</Info>}<div style={{marginBottom:14}}>{allModels.map(m=>{const a=av.includes(m),c=(cfg.models||[]).includes(m);const reason=mtB.has(m)?"Nur BT":nanB.has(m)?"Keine NaN":null;return(<label key={m} style={{display:"inline-flex",alignItems:"center",gap:7,marginRight:18,marginBottom:8,opacity:a?1:0.3,cursor:a?"pointer":"not-allowed"}}><input type="checkbox" checked={c&&a} disabled={!a} style={{accentColor:"#9B111E"}} onChange={e=>{const s=new Set(cfg.models||[]);e.target.checked?s.add(m):s.delete(m);set({...cfg,models:[...s]})}}/><span style={{fontSize:13.5}}>{m}</span>{!a&&reason&&<span style={{fontSize:10,color:"#999",fontStyle:"italic"}}> – {reason}</span>}</label>);})}</div><div>{allModels.map(m=><Tag key={m} label={m} off={!av.includes(m)||!(cfg.models||[]).includes(m)}/>)}</div></Sec><Sec title="Base Learner"><Sel label="Typ" options={["lgbm","catboost"]} value={cfg.baseLearner||"lgbm"} onChange={v=>set({...cfg,baseLearner:v,blFixed:{},fmtFixed:{}})}/>{!cfg.tuningEnabled && <><Divider/><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}}><span style={{fontSize:13.5,fontWeight:600,color:C.dark}}>Nuisance-Hyperparameter</span><span style={{fontSize:10,background:"#fffbeb",color:"#7a5a00",padding:"3px 12px",borderRadius:12,border:"1px solid #e8d49c",fontWeight:600,letterSpacing:0.2}}>Aktiv – Tuning ist deaktiviert</span></div><Info>Tuning ist deaktiviert. Diese Parameter werden direkt für alle Nuisance-Modelle (Outcome, Propensity) verwendet.</Info><FixedParamsEditor params={cfg.blFixed||{}} defaults={(cfg.baseLearner||"lgbm")==="catboost"?CB_DEFAULTS:LGBM_DEFAULTS} onChange={v=>set({...cfg,blFixed:v})}/></>}</Sec><Sec title="Base-Learner-Tuning" accent="#C4343F"><Toggle label="Aktivieren" checked={cfg.tuningEnabled} onChange={v=>set({...cfg,tuningEnabled:v})}/>{cfg.tuningEnabled&&<><Divider/><Row><Col><Inp label="Trials" type="number" value={cfg.tuningTrials||30} onChange={v=>set({...cfg,tuningTrials:Number(v)})} help="Anzahl Optuna-Kandidaten pro Study"/></Col><Col><Toggle label="Single-Fold-Tuning" checked={cfg.tuningSingleFold||false} onChange={v=>set({...cfg,tuningSingleFold:v})} help="Nur 1 Fold pro Trial evaluieren statt aller K. Deutlich schneller, etwas verrauschter."/></Col><Col><div style={{fontSize:11,color:C.textMuted,background:C.rose,padding:"6px 12px",borderRadius:8,marginBottom:10,lineHeight:1.4}}>CV-Folds: <strong style={{color:C.ruby}}>{cfg.tuningSingleFold ? "1" : (cfg.cvSplits||5)}</strong> (aus Validierungsstrategie{cfg.tuningSingleFold ? ", Single-Fold aktiv":""})</div><Sel label="Metrik" options={["log_loss","roc_auc","accuracy"]} value={cfg.tuningMetric||"log_loss"} onChange={v=>set({...cfg,tuningMetric:v})}/></Col></Row><Divider/><div style={{fontSize:13.5,fontWeight:600,color:"#6B0D15",marginBottom:8}}>Task-Sharing</div><Info>Default: Nuisance-Modelle mit gleicher Signatur teilen sich ein Tuning. Per Role und Per Learner erzeugen spezialisierte Hyperparameter – genauer, aber rechenintensiver.</Info><Row><Col><Toggle label="Per Role" checked={cfg.tuningPerRole||false} onChange={v=>set({...cfg,tuningPerRole:v})} help="Separate Parameter je Rolle (model_y, model_t)"/></Col><Col><Toggle label="Per Learner" checked={cfg.tuningPerLearner||false} onChange={v=>set({...cfg,tuningPerLearner:v})} help="Separate Parameter je kausalem Modell"/></Col></Row><Divider/><div style={{fontSize:13.5,fontWeight:600,color:"#6B0D15",marginBottom:8}}>Tuning-Plan</div><TuningPlanPreview models={cfg.models} perRole={cfg.tuningPerRole||false} perLearner={cfg.tuningPerLearner||false} trials={cfg.tuningTrials||30} cv={cfg.tuningSingleFold?1:(cfg.cvSplits||5)}/><Divider/><SSEditor bl={cfg.baseLearner||"lgbm"} sp={sp} setSp={setSp}/><Expander title="Erweiterte Tuning-Einstellungen"><Row><Col><Inp label="Timeout (Sek., 0=unbegrenzt)" type="number" value={cfg.tuningTimeout||0} onChange={v=>set({...cfg,tuningTimeout:Number(v)})} help="Zeitlimit pro Optuna-Study in Sekunden"/></Col><Col><Inp label="Max. Tuning-Rows (0=alle)" type="number" value={cfg.tuningMaxRows||0} onChange={v=>set({...cfg,tuningMaxRows:Number(v)})} help="Begrenzt die Daten für das Nuisance-Tuning"/></Col></Row></Expander></>}</Sec><Sec title="Final-Model-Tuning" accent="#D4A853"><Info>Optimiert das CATE-Effektmodell (model_final) via R-Score. Nur für NonParamDML und DRLearner. CausalForestDML nutzt EconMLs eigene tune()-Methode.</Info><Toggle label="R-Score-Tuning aktivieren" checked={cfg.fmtEnabled} onChange={v=>set({...cfg,fmtEnabled:v})} help="NonParamDML (RScorer) und DRLearner (score)"/>{cfg.fmtEnabled&&<><Divider/><div style={{fontSize:13,fontWeight:600,color:C.dark,marginBottom:8}}>Modelle für Final-Tuning</div><Info>Wähle, welche Modelle per R-Score/CV optimiert werden. Nicht ausgewählte Modelle verwenden die festen Hyperparameter (unten).</Info><div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:14}}>{(cfg.models||[]).filter(m=>["NonParamDML","DRLearner"].includes(m)).map(m=>{const active=(cfg.fmtModels||[]).includes(m);return(<label key={m} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 14px",borderRadius:8,border:active?"1.5px solid #D4A853":"1.5px solid "+C.border,background:active?"#fffbeb":"#fff",cursor:"pointer",fontSize:12.5,fontWeight:active?600:400,transition:"all 0.15s"}}><input type="checkbox" checked={active} style={{accentColor:"#D4A853"}} onChange={e=>{const s=new Set(cfg.fmtModels||[]);e.target.checked?s.add(m):s.delete(m);set({...cfg,fmtModels:[...s]})}}/>{m}</label>)})}{!(cfg.models||[]).some(m=>["NonParamDML","DRLearner"].includes(m))&&<Info type="warn">Keine FMT-fähigen Modelle (NonParamDML/DRLearner) ausgewählt.</Info>}{(cfg.models||[]).some(m=>["NonParamDML","DRLearner"].includes(m)) && (cfg.fmtModels||[]).length===0 && <Info type="warn">Kein Modell für Final-Tuning ausgewählt. Alle FMT-fähigen Modelle verwenden die festen Hyperparameter.</Info>}</div><Row><Col><Inp label="Trials" type="number" value={cfg.fmtTrials||20} onChange={v=>set({...cfg,fmtTrials:Number(v)})}/></Col><Col><Inp label="Max. Rows (0=alle)" type="number" value={cfg.fmtMaxRows||0} onChange={v=>set({...cfg,fmtMaxRows:Number(v)})}/></Col><Col><Toggle label="Single-Fold (DRLearner)" checked={cfg.fmtSingleFold||false} onChange={v=>set({...cfg,fmtSingleFold:v})} help="DRLearner: 1 Fold pro Trial statt K. Reduziert Fits drastisch. NonParamDML ist ohnehin Single-Fit (RScorer)."/></Col></Row><Row><Col><Sld label="Stability Penalty" min={0} max={2} step={0.1} value={cfg.fmtStabilityPenalty||0} onChange={v=>set({...cfg,fmtStabilityPenalty:v})} help="Bestraft instabile CATE-Schätzungen mit hoher Streuung. 0 = reiner R-Score (Default). 0.3–0.5 = moderate Regularisierung. 1.0+ = starke Stabilität (ähnlich CausalForestDML)."/></Col></Row><Divider/><div style={{fontSize:13.5,fontWeight:600,color:"#6B0D15",marginBottom:8}}>Suchraum (Final-Modell)</div><SSEditor bl={cfg.baseLearner||"lgbm"} sp={spFmt||{lgbm:{},catboost:{}}} setSp={setSpFmt||setSp} fmt/><Expander title="Erweiterte Final-Tuning-Einstellungen"><Row><Col><Inp label="Timeout (Sek., 0=unbegrenzt)" type="number" value={cfg.fmtTimeout||0} onChange={v=>set({...cfg,fmtTimeout:Number(v)})} help="Zeitlimit pro Final-Model-Optuna-Study"/></Col></Row></Expander><Divider/><div style={{fontSize:13.5,fontWeight:600,color:"#6B0D15",marginBottom:8}}>Final-Tuning-Plan</div><FinalTuningPlanPreview models={cfg.models} fmtEnabled={cfg.fmtEnabled} fmtModels={cfg.fmtModels||[]} fmtSingleFold={cfg.fmtSingleFold||false} fmtTrials={cfg.fmtTrials||20} fmtCv={cfg.cvSplits||5} cfTune={cfg.cfTune||false}/></>}{(cfg.models||[]).includes("CausalForestDML")&&<><Divider/><div style={{fontSize:13.5,fontWeight:600,color:C.dark,marginBottom:8}}>CausalForestDML – Wald-Parameter</div><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}}>{cfg.cfTune && <span style={{fontSize:10,background:"#e8f5ec",color:"#1a7f37",padding:"3px 12px",borderRadius:12,border:"1px solid #a3d9b1",fontWeight:600,letterSpacing:0.2}}>tune() überschreibt Teilmenge</span>}{!cfg.cfTune && <span style={{fontSize:10,background:"#fffbeb",color:"#7a5a00",padding:"3px 12px",borderRadius:12,border:"1px solid #e8d49c",fontWeight:600,letterSpacing:0.2}}>Direkt verwendet</span>}</div><Info>{cfg.cfTune ? "tune() optimiert min_weight_fraction_leaf, max_depth und min_var_fraction_leaf. Alle anderen Parameter bleiben wie hier eingestellt." : "Diese Parameter werden direkt für den CausalForestDML verwendet. Aktiviere tune() oben für automatische Optimierung der wichtigsten Wald-Parameter."}</Info><FixedParamsEditor params={cfg.cfFixed||{}} defaults={CF_DEFAULTS} onChange={v=>set({...cfg,cfFixed:v})}/><Divider/><Toggle label="EconML tune() aktivieren" checked={cfg.cfTune||false} onChange={v=>set({...cfg,cfTune:v})} help="Grid-Search über min_weight_fraction_leaf, max_depth, min_var_fraction_leaf (12 Kombinationen)"/>{cfg.cfTune&&<Row><Col><Inp label="Max. Tune-Rows (0=alle)" type="number" value={cfg.cfTuneMaxRows||0} onChange={v=>set({...cfg,cfTuneMaxRows:Number(v)})} help="Begrenzt Daten für tune() – beschleunigt bei grossen Datensätzen"/></Col></Row>}</>}{!cfg.fmtEnabled && (cfg.cfTune||(cfg.models||[]).some(m=>["NonParamDML","DRLearner"].includes(m))) && <><Divider/><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,flexWrap:"wrap"}}><span style={{fontSize:13.5,fontWeight:600,color:C.dark}}>Final-Modell-Hyperparameter</span><span style={{fontSize:10,background:"#fffbeb",color:"#7a5a00",padding:"3px 12px",borderRadius:12,border:"1px solid #e8d49c",fontWeight:600,letterSpacing:0.2}}>Aktiv – kein FMT</span></div><Info>{cfg.fmtEnabled ? `Final-Model-Tuning ist aktiviert für ${(cfg.fmtModels||[]).join(", ")||"alle FMT-fähigen Modelle"}. Nicht getunte Modelle verwenden diese Parameter.` : "Final-Model-Tuning ist deaktiviert. Diese Parameter werden direkt für das CATE-Effektmodell (model_final) von NonParamDML und DRLearner verwendet."}</Info><FixedParamsEditor params={cfg.fmtFixed||{}} defaults={(cfg.baseLearner||"lgbm")==="catboost"?CB_FINAL_DEFAULTS:LGBM_FINAL_DEFAULTS} onChange={v=>set({...cfg,fmtFixed:v})}/><Divider/><div style={{fontSize:13.5,fontWeight:600,color:"#6B0D15",marginBottom:8}}>Final-Tuning-Plan</div><FinalTuningPlanPreview models={cfg.models} fmtEnabled={cfg.fmtEnabled} fmtModels={cfg.fmtModels||[]} fmtSingleFold={cfg.fmtSingleFold||false} fmtTrials={cfg.fmtTrials||20} fmtCv={cfg.cvSplits||5} cfTune={cfg.cfTune||false}/></>}</Sec><Sec title="Datennutzung pro Modell"><Info>Steuert, welcher Anteil der Trainingsdaten pro Modell genutzt wird. Default 1.0 = alle Daten. Reduzieren für schnellere Iterationen bei großen Datensätzen.</Info>{(()=>{const m=cfg.models||[];const sliders=[];if(m.includes("SLearner"))sliders.push(<Sld key="sl" label="SLearner" min={0.05} max={1} step={0.05} value={cfg.fracSL||1} onChange={v=>set({...cfg,fracSL:v})}/>);if(m.includes("TLearner"))sliders.push(<Sld key="tl" label="TLearner" min={0.05} max={1} step={0.05} value={cfg.fracTL||1} onChange={v=>set({...cfg,fracTL:v})}/>);if(m.includes("XLearner"))sliders.push(<Sld key="xl" label="XLearner" min={0.05} max={1} step={0.05} value={cfg.fracXL||1} onChange={v=>set({...cfg,fracXL:v})}/>);if(m.some(x=>["NonParamDML","ParamDML","CausalForestDML"].includes(x)))sliders.push(<Sld key="dml" label="DML-Modelle" min={0.05} max={1} step={0.05} value={cfg.fracDML||1} onChange={v=>set({...cfg,fracDML:v})}/>);if(m.includes("DRLearner"))sliders.push(<Sld key="dr" label="DRLearner" min={0.05} max={1} step={0.05} value={cfg.fracDR||1} onChange={v=>set({...cfg,fracDR:v})}/>);return sliders.length>0?<div style={{display:"grid",gridTemplateColumns:sliders.length>=3?"1fr 1fr 1fr":sliders.length===2?"1fr 1fr":"1fr",gap:"6px 14px"}}>{sliders}</div>:<Info type="warn">Keine Modelle ausgewählt.</Info>;})()}</Sec></>);
};

const PSelection = ({cfg,set}) => {
  const mt=cfg.treatmentType==="multi";
  const mo=mt?["policy_value","policy_value_treat_positive_T1","qini_T1","auuc_T1"]:["qini","auuc","uplift_at_10pct","uplift_at_20pct","uplift_at_50pct","policy_value_treat_positive"];
  const metricDescs={
    qini:"Fläche unter der Qini-Kurve. Misst den kumulativen Uplift über alle Dezile. Standard bei Binary Treatment.",
    auuc:"Area Under Uplift Curve. Ähnlich wie Qini, normiert auf zufällige Behandlung.",
    uplift_at_10pct:"Uplift in den Top-10% der Kunden mit höchstem CATE. Für aggressive Targeting-Strategien.",
    uplift_at_20pct:"Uplift in den Top-20%. Guter Kompromiss zwischen Reichweite und Genauigkeit.",
    uplift_at_50pct:"Uplift in der oberen Hälfte. Konservativere Strategie mit breiterem Targeting.",
    policy_value_treat_positive:"Policy Value: Erwarteter Wert, wenn nur Kunden mit positivem CATE behandelt werden.",
    policy_value:"Gewichteter Wert der optimalen Treatment-Zuweisung über alle Arme. Standard bei Multi-Treatment.",
    policy_value_treat_positive_T1:"Policy Value für Treatment-Arm 1.",
    qini_T1:"Qini für Treatment-Arm 1.",
    auuc_T1:"AUUC für Treatment-Arm 1.",
  };

  return (<>
    <Sec title="Champion-Auswahl">
      <Info>Nach der Evaluation aller Modelle wird automatisch ein <strong>Champion</strong> gekürt – das Modell mit dem besten Wert auf der gewählten Metrik. Alle anderen Modelle sind <strong>Challenger</strong> und werden im Bundle mitgespeichert.</Info>
      <div style={{fontSize:13,fontWeight:600,color:C.dark,marginBottom:8}}>Auswahl-Metrik</div>
      <Row>
        <Col>
          <Sel label="Metrik" options={mo} value={cfg.selMetric||(mt?"policy_value":"qini")} onChange={v=>set({...cfg,selMetric:v})}/>
          <div style={{fontSize:12,color:C.textMuted,lineHeight:1.5,marginTop:-8,marginBottom:12}}>{metricDescs[cfg.selMetric||"qini"]||""}</div>
        </Col>
        <Col>
          <Toggle label="Higher is better" checked={cfg.higherBetter!==false} onChange={v=>set({...cfg,higherBetter:v})} help="Standard: An. Für die meisten Uplift-Metriken gilt: höher = besser. Nur bei Spezialmetriken ggf. umkehren."/>
        </Col>
      </Row>

      <Divider/>
      <div style={{fontSize:13,fontWeight:600,color:C.dark,marginBottom:8}}>Refit & Override</div>
      <Row>
        <Col>
          <Toggle label="Champion auf gesamtem Datensatz refitten" checked={cfg.refitChamp!==false} onChange={v=>set({...cfg,refitChamp:v})} help="Nach der CV-Evaluation wird das Champion-Modell nochmal auf allen Daten trainiert. Empfohlen: erhöht die Modellqualität für den Produktiv-Einsatz."/>
        </Col>
        <Col>
          <Sel label="Manueller Champion (optional)" options={["(automatisch)",...(cfg.models||[])]} value={cfg.manualChamp||"(automatisch)"} onChange={v=>set({...cfg,manualChamp:v==="(automatisch)"?null:v})} help="Überschreibt die automatische Auswahl. Nützlich, wenn fachliche Gründe für ein bestimmtes Modell sprechen."/>
        </Col>
      </Row>
    </Sec>

    <Sec title="Surrogate-Einzelbaum">
      <Info>Ein interpretierbarer <strong>Entscheidungsbaum</strong>, der die CATE-Predictions des Champions nachlernt (Teacher-Student-Prinzip). Nützlich für Fachbereiche, die regelbasierte Erklärungen benötigen, oder wenn regulatorische Anforderungen keine Black-Box-Modelle erlauben.</Info>
      <Toggle label="Surrogate-Tree aktivieren" checked={cfg.surrEnabled} onChange={v=>set({...cfg,surrEnabled:v})}/>
      {cfg.surrEnabled&&<>
        <Divider/>
        <Info type="warn">Der Surrogate-Baum approximiert den Champion – er ist nicht das Champion-Modell selbst. Je weniger Blätter, desto interpretierbarer, aber auch ungenauer.</Info>
        <Row>
          <Col><Sld label="Min. Samples pro Blatt" min={10} max={500} step={10} value={cfg.surrMinLeaf||50} onChange={v=>set({...cfg,surrMinLeaf:v})}/><div style={{fontSize:11,color:C.textMuted,marginTop:-8}}>Verhindert zu kleine Segmente. Höher = stabilere Regeln.</div></Col>
          <Col><Sld label="Max. Blätter" min={2} max={128} step={1} value={cfg.surrLeaves||31} onChange={v=>set({...cfg,surrLeaves:v})}/><div style={{fontSize:11,color:C.textMuted,marginTop:-8}}>Komplexität des Baums. 8–16 für einfache Regeln, 31+ für mehr Detail.</div></Col>
          <Col><Sld label="Max. Tiefe (0=unbegrenzt)" min={0} max={20} step={1} value={cfg.surrDepth||0} onChange={v=>set({...cfg,surrDepth:v})}/><div style={{fontSize:11,color:C.textMuted,marginTop:-8}}>Alternative Komplexitätsbegrenzung. 0 = nur durch Blätter begrenzt.</div></Col>
        </Row>
      </>}
    </Sec>

    <Sec title="Bundle-Export">
      <Info>Exportiert alle Artefakte in ein Verzeichnis: Modelle (.pkl), Preprocessor, Config, Registry. Grundlage für <strong>run_production.py</strong> (Batch-Scoring) und <strong>run_promote.py</strong> (Champion wechseln). Ohne Bundle können Modelle nicht außerhalb der Analyse-Pipeline verwendet werden.</Info>
      <Toggle label="Bundle-Export aktivieren" checked={cfg.bundleEnabled} onChange={v=>set({...cfg,bundleEnabled:v})}/>
      {cfg.bundleEnabled&&<>
        <Divider/>
        <Row>
          <Col><Inp label="Bundle-Verzeichnis" value={cfg.bundleDir||"bundles"} onChange={v=>set({...cfg,bundleDir:v})} help="Innerhalb dieses Ordners wird ein Unterordner mit Timestamp-ID angelegt"/></Col>
          <Col>
            <Toggle label="Challenger-Modelle einschließen" checked={cfg.bundleChallengers!==false} onChange={v=>set({...cfg,bundleChallengers:v})} help="Alle trainierten Modelle exportieren, nicht nur den Champion. Ermöglicht nachträglichen Champion-Wechsel via run_promote.py."/>
          </Col>
          <Col>
            <Toggle label="Bundle in MLflow loggen" checked={cfg.bundleMlflow!==false} onChange={v=>set({...cfg,bundleMlflow:v})} help="Das Bundle-Verzeichnis als MLflow-Artifact hochladen. Macht es über das MLflow-UI auffindbar."/>
          </Col>
        </Row>
      </>}
    </Sec>
  </>);
};

const PExplain = ({cfg,set}) => (<>
  <Sec title="Feature-Importance" accent="#D4A853">
    <Info>Berechnet den Beitrag jedes Features zur Uplift-Prediction. Wird nach der Analyse automatisch für den Champion ausgeführt. Hilft bei der Interpretation und beim Feature-Engineering.</Info>
    <Toggle label="Explainability aktivieren" checked={cfg.explEnabled} onChange={v=>set({...cfg,explEnabled:v})}/>
    {cfg.explEnabled&&<>
      <Divider/>
      <div style={{fontSize:13,fontWeight:600,color:C.dark,marginBottom:8}}>Methode</div>
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        {[{k:"shap",l:"SHAP",d:"SHapley Additive exPlanations – globale und lokale Erklärungen. Berechnet den exakten Beitrag jedes Features pro Beobachtung."},{k:"permutation",l:"Permutation",d:"Permutation Importance – modell-agnostisch. Misst den Metrik-Verfall bei zufälliger Feature-Permutation. Schneller, aber nur global."}].map(o => {
          const active = (cfg.explMethod||"shap") === o.k;
          return (
            <button key={o.k} onClick={()=>set({...cfg,explMethod:o.k})} style={{flex:1,padding:"14px 18px",borderRadius:12,border:active?"2px solid #D4A853":"1.5px solid "+C.border,background:active?"#fffbeb":"#fff",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:14,height:14,borderRadius:7,border:active?"4px solid #D4A853":"2px solid #ccc",background:"#fff",flexShrink:0}}/>
                <span style={{fontSize:13.5,fontWeight:600,color:active?"#7a5a00":"#333"}}>{o.l}</span>
              </div>
              <div style={{fontSize:11.5,color:C.textMuted,marginTop:6,lineHeight:1.5}}>{o.d}</div>
            </button>
          );
        })}
      </div>
      <Row>
        <Col><Inp label="Sample Size" type="number" value={cfg.explSampleSize||10000} onChange={v=>set({...cfg,explSampleSize:Number(v)})} help="Anzahl Beobachtungen für SHAP/Permutation. Bei großen Datensätzen wird gesampled."/></Col>
        <Col><Inp label="Top-N Features" type="number" value={cfg.explTopN||20} onChange={v=>set({...cfg,explTopN:Number(v)})} help="Anzahl Features im Importance-Report und in den SHAP-Plots"/></Col>
        <Col><Sld label="Bins (Dependency-Plots)" min={4} max={20} step={1} value={cfg.shapBins||10} onChange={v=>set({...cfg,shapBins:v})}/></Col>
      </Row>
      <Divider/>
      <div style={{fontSize:13,fontWeight:600,color:C.dark,marginBottom:8}}>Modellauswahl für Importance</div>
      <Info>Standard: nur der Champion. Optional können weitere Modelle für den Vergleich hinzugefügt werden.</Info>
      <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:8}}>
        {(cfg.models||[]).map(m => {
          const checked = (cfg.shapModels||[]).includes(m);
          return (
            <label key={m} style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 14px",borderRadius:8,border:checked?"1.5px solid #D4A853":"1.5px solid "+C.border,background:checked?"#fffbeb":"#fff",cursor:"pointer",fontSize:12.5,fontWeight:checked?600:400,transition:"all 0.15s"}}>
              <input type="checkbox" checked={checked} style={{accentColor:"#D4A853"}} onChange={e=>{const s=new Set(cfg.shapModels||[]);e.target.checked?s.add(m):s.delete(m);set({...cfg,shapModels:[...s]})}}/>
              {m}
            </label>
          );
        })}
      </div>
    </>}
  </Sec>

  {cfg.explEnabled && (
    <Sec title="Segmentanalyse" accent="#D4A853">
      <Info>Teilt Kunden in Quantil-Gruppen nach CATE-Höhe und analysiert Feature-Verteilungen pro Segment. Zeigt, welche Merkmale High-Uplift- von Low-Uplift-Kunden unterscheiden.</Info>
      <Toggle label="Segmentanalyse aktivieren" checked={cfg.segEnabled!==false} onChange={v=>set({...cfg,segEnabled:v})}/>
      {cfg.segEnabled!==false&&<>
        <Divider/>
        <Row>
          <Col><Sld label="Quantile" min={4} max={20} step={1} value={cfg.segQuantiles||10} onChange={v=>set({...cfg,segQuantiles:v})}/><div style={{fontSize:11,color:C.textMuted,marginTop:-8}}>10 = Dezile (Top-10% vs. Bottom-10%).</div></Col>
          <Col><Sld label="Top-Features" min={3} max={20} step={1} value={cfg.segTopFeatures||8} onChange={v=>set({...cfg,segTopFeatures:v})}/><div style={{fontSize:11,color:C.textMuted,marginTop:-8}}>Anzahl Features im Segmentvergleich.</div></Col>
        </Row>
        <Row>
          <Col><Sld label="Max. Bins (numerisch)" min={3} max={15} step={1} value={cfg.segMaxBins||6} onChange={v=>set({...cfg,segMaxBins:v})}/><div style={{fontSize:11,color:C.textMuted,marginTop:-8}}>Diskretisierung numerischer Features.</div></Col>
          <Col><Sld label="Max. Kategorien" min={5} max={50} step={1} value={cfg.segMaxCats||15} onChange={v=>set({...cfg,segMaxCats:v})}/><div style={{fontSize:11,color:C.textMuted,marginTop:-8}}>Limit für kategorische Features. Seltene werden gruppiert.</div></Col>
        </Row>
      </>}
    </Sec>
  )}
</>);

// ── YAML Builder + Validate ──
const buildYaml = (cfg, sp, spFmt) => {
  const l=[],a=s=>l.push(s),bl=cfg.baseLearner||"lgbm";
  const jsonInline = (obj) => {
    if(!obj || Object.keys(obj).length===0) return "{}";
    return "{ "+Object.entries(obj).map(([k,v])=>k+": "+(v===null?"null":v===true?"true":v===false?"false":typeof v==="string"?"\""+v+"\"":v)).join(", ")+" }";
  };
  const emitSS = (ssObj, indent) => {
    const pad = " ".repeat(indent);
    const cur = ssObj[bl] || {};
    const defs = bl==="catboost" ? CB : LGBM;
    const hasCustom = Object.keys(cur).length > 0;
    if (!hasCustom) return;
    a(pad + "search_space:");
    a(pad + "  " + bl + ":");
    Object.entries(defs).forEach(([k, d]) => {
      const c = cur[k];
      const lo = c?.low ?? d.min;
      const hi = c?.high ?? d.max;
      if (lo !== d.min || hi !== d.max) {
        const t = d.type === "int" ? "int" : "float";
        a(pad + `    ${k}: {type: ${t}, low: ${lo}, high: ${hi}}`);
      }
    });
  };
  const emitSSFmt = (ssObj, indent) => {
    const pad = " ".repeat(indent);
    const cur = ssObj[bl] || {};
    const defs = bl==="catboost" ? CB_FMT : LGBM_FMT;
    const hasCustom = Object.keys(cur).length > 0;
    if (!hasCustom) return;
    a(pad + "search_space:");
    a(pad + "  " + bl + ":");
    Object.entries(defs).forEach(([k, d]) => {
      const c = cur[k];
      const lo = c?.low ?? d.min;
      const hi = c?.high ?? d.max;
      if (lo !== d.min || hi !== d.max) {
        const t = d.type === "int" ? "int" : "float";
        a(pad + `    ${k}: {type: ${t}, low: ${lo}, high: ${hi}}`);
      }
    });
  };
  const mt = cfg.treatmentType==="multi";

  a("mlflow:");
  a(`  experiment_name: ${cfg.expName||"rubin"}`);
  a("");
  a("constants:");
  a(`  SEED: ${cfg.seed||42}`);
  if((cfg.parallelLevel||2) !== 2) a(`  parallel_level: ${cfg.parallelLevel}`);
  a("");
  a("data_files:");
  a(`  x_file: ${cfg.x_file||"data/processed/X.parquet"}`);
  a(`  t_file: ${cfg.t_file||"data/processed/T.parquet"}`);
  a(`  y_file: ${cfg.y_file||"data/processed/Y.parquet"}`);
  a(`  s_file: ${cfg.s_file||"null"}`);
  if(cfg.validateOn==="external") {
    if(cfg.eval_x_file) a(`  eval_x_file: ${cfg.eval_x_file}`);
    if(cfg.eval_t_file) a(`  eval_t_file: ${cfg.eval_t_file}`);
    if(cfg.eval_y_file) a(`  eval_y_file: ${cfg.eval_y_file}`);
    if(cfg.eval_s_file) a(`  eval_s_file: ${cfg.eval_s_file}`);
  }
  if(cfg.eval_mask_file) a(`  eval_mask_file: ${cfg.eval_mask_file}`);
  a("");
  a("treatment:");
  a(`  type: ${cfg.treatmentType||"binary"}`);
  a(`  reference_group: ${cfg.refGroup||0}`);
  a("");
  a("historical_score:");
  a(`  name: ${cfg.histScoreName||"historical_score"}`);
  a(`  column: ${cfg.histScoreCol||"S"}`);
  a(`  higher_is_better: ${cfg.histScoreHigher!==false}`);
  a("");
  a("data_processing:");
  a(`  validate_on: ${cfg.validateOn||"cross"}`);
  if(cfg.validateOn==="cross"||cfg.validateOn===undefined) a(`  cross_validation_splits: ${cfg.cvSplits||5}`);
  if(cfg.validateOn==="external") a(`  cross_validation_splits: ${cfg.cvSplits||5}`);
  if(cfg.downsample) a(`  df_frac: ${cfg.dfFrac||0.1}`);
  a(`  reduce_memory: ${cfg.reduceMem!==false}`);
  a("");
  a("feature_selection:");
  a(`  enabled: ${!!cfg.fsEnabled}`);
  if(cfg.fsEnabled) {
    a(`  methods: [${(cfg.fsMethods||["lgbm_importance"]).join(", ")}]`);
    a(`  top_pct: ${cfg.fsTopPct||15}`);
    a(`  correlation_threshold: ${cfg.fsCorrThresh||0.9}`);
    if(cfg.fsMaxFeatures) a(`  max_features: ${cfg.fsMaxFeatures}`);
  }
  a("");
  a("models:");
  a(`  models_to_train: [${(cfg.models||["NonParamDML"]).join(", ")}]`);
  a("");
  a("base_learner:");
  a(`  type: ${bl}`);
  const blF = cfg.blFixed||{};
  if(Object.keys(blF).length > 0) a(`  fixed_params: ${jsonInline(blF)}`);
  a("");
  if((cfg.models||[]).includes("CausalForestDML")) {
    a("causal_forest:");
    const cfF = cfg.cfFixed||{};
    if(Object.keys(cfF).length > 0) {
      a("  forest_fixed_params:");
      Object.entries(cfF).forEach(([k,v]) => a(`    ${k}: ${v===null?"null":v}`));
    } else {
      a("  forest_fixed_params: { n_jobs: -1 }");
    }
    a(`  use_econml_tune: ${!!cfg.cfTune}`);
    a("  econml_tune_params: auto");
    if(cfg.cfTuneMaxRows) a(`  tune_max_rows: ${cfg.cfTuneMaxRows}`);
    a("");
  }
  a("tuning:");
  a(`  enabled: ${!!cfg.tuningEnabled}`);
  if(cfg.tuningEnabled) {
    a(`  n_trials: ${cfg.tuningTrials||30}`);
    a(`  cv_splits: ${cfg.cvSplits||5}`);
    a(`  metric: ${cfg.tuningMetric||"log_loss"}`);
    if(cfg.tuningSingleFold) a("  single_fold: true");
    if(cfg.tuningPerRole) a("  per_role: true");
    if(cfg.tuningPerLearner) a("  per_learner: true");
    if(cfg.tuningTimeout) a(`  timeout_seconds: ${cfg.tuningTimeout}`);
    if(cfg.tuningMaxRows > 0) a(`  max_tuning_rows: ${cfg.tuningMaxRows}`);
  }
  if(sp) emitSS(sp, 2);
  a("");
  a("final_model_tuning:");
  a(`  enabled: ${!!cfg.fmtEnabled}`);
  if(cfg.fmtEnabled) {
    a(`  n_trials: ${cfg.fmtTrials||20}`);
    if((cfg.fmtModels||[]).length > 0) a(`  models: [${cfg.fmtModels.join(", ")}]`);
    if(cfg.fmtSingleFold) a("  single_fold: true");
    if(cfg.fmtStabilityPenalty > 0) a(`  stability_penalty: ${cfg.fmtStabilityPenalty}`);
    a(`  cv_splits: ${cfg.cvSplits||5}`);
    if(cfg.fmtMaxRows > 0) a(`  max_tuning_rows: ${cfg.fmtMaxRows}`);
    if(cfg.fmtTimeout) a(`  timeout_seconds: ${cfg.fmtTimeout}`);
  }
  const fmtF = cfg.fmtFixed||{};
  if(Object.keys(fmtF).length > 0) a(`  fixed_params: ${jsonInline(fmtF)}`);
  if(spFmt) emitSSFmt(spFmt, 2);
  a("");
  const fracs = {s_learner_frac:cfg.fracSL,t_learner_group_frac:cfg.fracTL,x_learner_group_frac:cfg.fracXL,dml_frac:cfg.fracDML,dr_learner_frac:cfg.fracDR};
  a("learner_data_usage:");
  Object.entries(fracs).forEach(([k,v]) => a(`  ${k}: ${v!==undefined?v:1.0}`));
  a("");
  a("shap_values:");
  a(`  calculate_shap_values: ${!!cfg.explEnabled}`);
  if(cfg.explEnabled) {
    if((cfg.shapModels||[]).length > 0) a(`  shap_calculation_models: [${cfg.shapModels.join(", ")}]`);
    a(`  n_shap_values: ${cfg.explSampleSize||10000}`);
    a(`  top_n_features: ${cfg.explTopN||20}`);
    a(`  num_bins: ${cfg.shapBins||10}`);
  }
  a("");
  a("segment_analysis:");
  a(`  enabled: ${cfg.segEnabled!==false && !!cfg.explEnabled}`);
  if(cfg.segEnabled!==false && cfg.explEnabled) {
    a(`  quantiles: ${cfg.segQuantiles||10}`);
    a(`  top_n_features: ${cfg.segTopFeatures||8}`);
    a(`  max_bins: ${cfg.segMaxBins||6}`);
    a(`  max_categories: ${cfg.segMaxCats||15}`);
  }
  a("");
  a("selection:");
  a(`  metric: ${cfg.selMetric||(mt?"policy_value":"qini")}`);
  a(`  higher_is_better: ${cfg.higherBetter!==false}`);
  a(`  refit_champion_on_full_data: ${cfg.refitChamp!==false}`);
  if(cfg.manualChamp) a(`  manual_champion: ${cfg.manualChamp}`);
  a("");
  a("surrogate_tree:");
  a(`  enabled: ${!!cfg.surrEnabled}`);
  if(cfg.surrEnabled) {
    a(`  min_samples_leaf: ${cfg.surrMinLeaf||50}`);
    a(`  num_leaves: ${cfg.surrLeaves||31}`);
    if(cfg.surrDepth) a(`  max_depth: ${cfg.surrDepth}`);
  }
  a("");
  a("optional_output:");
  a(`  output_dir: ${cfg.outputDir||"null"}`);
  a(`  save_predictions: ${!!cfg.savePreds}`);
  if(cfg.savePreds) {
    a(`  predictions_format: ${cfg.predsFormat||"csv"}`);
    if(cfg.maxPredRows) a(`  max_prediction_rows: ${cfg.maxPredRows}`);
  }
  a("");
  a("bundle:");
  a(`  enabled: ${!!cfg.bundleEnabled}`);
  if(cfg.bundleEnabled) {
    a(`  base_dir: ${cfg.bundleDir||"bundles"}`);
    a(`  include_challengers: ${cfg.bundleChallengers!==false}`);
    a(`  log_to_mlflow: ${cfg.bundleMlflow!==false}`);
  }
  return l.join("\n");
};
const validate = cfg => {
  const i=[];
  if(!cfg.expName)i.push("Experiment-Name fehlt.");
  if(!cfg.x_file)i.push("X-Datei nicht angegeben.");
  if(!cfg.t_file)i.push("T-Datei nicht angegeben.");
  if(!cfg.y_file)i.push("Y-Datei nicht angegeben.");
  if(cfg.validateOn==="external") {
    if(!cfg.eval_x_file)i.push("Eval X-Datei nicht angegeben (externe Validierung).");
    if(!cfg.eval_t_file)i.push("Eval T-Datei nicht angegeben (externe Validierung).");
    if(!cfg.eval_y_file)i.push("Eval Y-Datei nicht angegeben (externe Validierung).");
  }
  if(!(cfg.models||[]).length)i.push("Keine Modelle ausgewählt.");
  if(cfg.treatmentType==="multi"){const b=(cfg.models||[]).filter(m=>btOnly.has(m));if(b.length > 0)i.push(`MT nicht kompatibel mit: ${b.join(", ")}`);}
  if(cfg.hasNaN&&(cfg.models||[]).includes("CausalForestDML"))i.push("CausalForestDML bei NaN nicht verfügbar.");
  return i;
};

const PPreview = ({cfg,sp,spFmt}) => {const y=buildYaml(cfg,sp,spFmt),issues=validate(cfg);const mt=cfg.treatmentType==="multi";return(<>

    <MC value={cfg.treatmentType==="multi"?"Multi":"Binary"} label="Treatment"/>
    <MC value={(cfg.models||[]).length} label="Modelle"/>
