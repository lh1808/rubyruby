# ============================================================
# EXPLAINABILITY – Schwerpunkt auf Erklärbarkeit
# ============================================================
# Feature-Selektion + erweiterte Segment-/SHAP-Einstellungen.
# Weniger Modelle, dafür saubere Interpretierbarkeit.
#
#   python run_analysis.py --config configs/config_explainability.yml --export-bundle
#   python run_explain.py --bundle bundles/<id> --x data/X.parquet --method shap
# ============================================================

mlflow:
  experiment_name: rubin_explainability

constants:
  SEED: 42

data_files:
  x_file: data/processed/X.parquet
  t_file: data/processed/T.parquet
  y_file: data/processed/Y.parquet
  dtypes_file: data/processed/dtypes.json

feature_selection:
  enabled: true
  methods: [lgbm_importance, causal_forest]
  top_pct: 15.0
  max_features: 100
  correlation_threshold: 0.85

models:
  models_to_train:
    - SLearner
    - TLearner
    - DRLearner

base_learner:
  type: lgbm
  fixed_params: {}

tuning:
  enabled: true
  n_trials: 30
  cv_splits: 5
  optuna_seed: 42
  search_space:
    lgbm:
      n_estimators:        {type: int,   low: 200,    high: 1000}
      learning_rate:       {type: float, low: 0.01,   high: 0.15,  log: true}
      num_leaves:          {type: int,   low: 15,     high: 127}
      max_depth:           {type: int,   low: 3,      high: 8}
      min_child_samples:   {type: int,   low: 10,     high: 200}
      min_child_weight:    {type: float, low: 0.01,   high: 50.0,  log: true}
      subsample:           {type: float, low: 0.5,    high: 1.0}
      colsample_bytree:    {type: float, low: 0.3,    high: 0.9}
      min_split_gain:      {type: float, low: 0.0,    high: 1.0}
      reg_alpha:           {type: float, low: 1.0e-6, high: 20.0,  log: true}
      reg_lambda:          {type: float, low: 1.0e-6, high: 20.0,  log: true}
      path_smooth:         {type: float, low: 0.0,    high: 10.0}

shap_values:
  n_shap_values: 5000
  top_n_features: 25
  num_bins: 12

segment_analysis:
  enabled: true
  quantiles: 10
  top_n_features: 12
  max_bins: 8
  max_categories: 20

optional_output:
  output_dir: runs/explainability
  save_predictions: true
  predictions_format: parquet

bundle:
  enabled: true
  base_dir: bundles
  include_challengers: true
  log_to_mlflow: true

selection:
  metric: qini
  higher_is_better: true
  refit_champion_on_full_data: true
