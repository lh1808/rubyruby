mlflow:
  experiment_name: rubin_dml_focus
constants:
  SEED: 42
data_files:
  x_file: data/processed/X.parquet
  t_file: data/processed/T.parquet
  y_file: data/processed/Y.parquet
  dtypes_file: data/processed/dtypes.json
models:
  models_to_train:
  - NonParamDML
  - DRLearner
  - CausalForestDML
base_learner:
  type: lgbm
  fixed_params: {}
causal_forest:
  forest_fixed_params:
    n_jobs: -1
    min_samples_leaf: 10
  use_econml_tune: true
  tune_max_rows: 150000
tuning:
  enabled: true
  n_trials: 50
  cv_splits: 5
  optuna_seed: 42
  search_space:
    lgbm:
      n_estimators:
        type: int
        low: 200
        high: 600
      learning_rate:
        type: float
        low: 0.01
        high: 0.15
        log: true
      num_leaves:
        type: int
        low: 15
        high: 127
      max_depth:
        type: int
        low: 3
        high: 8
      min_child_samples:
        type: int
        low: 10
        high: 200
      min_child_weight:
        type: float
        low: 0.01
        high: 50.0
        log: true
      subsample:
        type: float
        low: 0.5
        high: 1.0
      colsample_bytree:
        type: float
        low: 0.3
        high: 0.9
      min_split_gain:
        type: float
        low: 0.0
        high: 1.0
      reg_alpha:
        type: float
        low: 1.0e-06
        high: 20.0
        log: true
      reg_lambda:
        type: float
        low: 1.0e-06
        high: 20.0
        log: true
      path_smooth:
        type: float
        low: 0.0
        high: 10.0
final_model_tuning:
  enabled: true
  n_trials: 30
  cv_splits: 5
  search_space:
    lgbm:
      n_estimators:
        type: int
        low: 50
        high: 300
      learning_rate:
        type: float
        low: 0.005
        high: 0.08
        log: true
      num_leaves:
        type: int
        low: 4
        high: 31
      max_depth:
        type: int
        low: 2
        high: 5
      min_child_samples:
        type: int
        low: 100
        high: 1000
      min_child_weight:
        type: float
        low: 1.0
        high: 100.0
        log: true
      subsample:
        type: float
        low: 0.4
        high: 0.8
      colsample_bytree:
        type: float
        low: 0.2
        high: 0.6
      max_bin:
        type: int
        low: 10
        high: 63
      min_split_gain:
        type: float
        low: 0.0
        high: 5.0
      reg_alpha:
        type: float
        low: 0.1
        high: 50.0
        log: true
      reg_lambda:
        type: float
        low: 1.0
        high: 100.0
        log: true
      path_smooth:
        type: float
        low: 0.0
        high: 50.0
  models:
  - NonParamDML
optional_output:
  output_dir: runs/dml_focus
  save_predictions: true
  predictions_format: parquet
bundle:
  enabled: true
  base_dir: bundles
  include_challengers: true
  log_to_mlflow: true
selection:
  metric: qini
  higher_is_better: true
  refit_champion_on_full_data: true
