[workspace]
name = "rubin"
description = "Causal ML Framework – Analyse- und Production-Pipelines"
channels = [
  "https://nexus3.lan.huk-coburg.de/repository/conda-qc-huk",
  "https://nexus3.lan.huk-coburg.de/repository/conda-forge",
]
platforms = ["linux-64"]

[tasks]
postinstall = """pip install --no-build-isolation --no-deps --disable-pip-version-check -e . && \
python -c 'import sklift' 2>/dev/null || pip install --no-deps --disable-pip-version-check 'scikit-uplift>=0.5' 2>/dev/null || true"""
analyze = { cmd = "python run_analysis.py", depends-on = ["postinstall"], description = "Analyse-Pipeline starten. Beispiel: pixi run analyze -- --config configs/config_quickstart.yml" }
analyze-quick = { cmd = "python run_analysis.py --config configs/config_quickstart.yml", depends-on = ["postinstall"], description = "Analyse mit Quickstart-Config (Smoke-Test)" }
dataprep = { cmd = "python run_dataprep.py", depends-on = ["postinstall"], description = "Datenaufbereitung. Beispiel: pixi run dataprep -- --config configs/config_full_example.yml" }
score = { cmd = "python run_production.py", depends-on = ["postinstall"], description = "Production-Scoring. Beispiel: pixi run score -- --bundle bundles/... --x data.csv --out scores.csv" }
explain = { cmd = "python run_explain.py", depends-on = ["postinstall"], description = "Explainability-Artefakte erzeugen. Beispiel: pixi run explain -- --bundle bundles/... --x data/X.parquet" }
promote = { cmd = "python run_promote.py", depends-on = ["postinstall"], description = "Champion im Bundle wechseln. Beispiel: pixi run promote -- --bundle bundles/... --model TLearner" }
sync-requirements = { cmd = "python scripts/sync_requirements.py", description = "requirements.txt und app/requirements_app.txt aus pyproject.toml generieren" }
build-app = { cmd = "python scripts/build_app_html.py", description = "React-App bauen: Libraries herunterladen und in rubin_ui.html einbetten (einmalig, braucht Internet)" }
info = { cmd = "python scripts/info.py", depends-on = ["postinstall"], description = "Zeigt Framework-Informationen" }

[dependencies]
python = ">=3.10,<3.13"
numpy = ">=1.24"
pandas = ">=2.0"
pydantic = ">=2.0"
scikit-learn = ">=1.3"
mlflow = ">=2.10"
optuna = ">=3.5"
matplotlib-base = ">=3.7"
scipy = ">=1.11"
lightgbm = ">=4.0"
catboost = ">=1.2"
econml = ">=0.15"
pyarrow = ">=12"
pyyaml = ">=6.0"
# scikit-uplift: wird über postinstall via pip installiert (nicht alle
# conda-forge-Mirrors haben das Paket). Alle Dependencies (sklearn, numpy,
# pandas, matplotlib) sind bereits über conda installiert.
# Build-Tools (für postinstall / pip install -e .)
pip = "*"
setuptools = ">=61"
setuptools-scm = "*"

# ── Feature: shap (optional) ──
[feature.shap.dependencies]
shap = ">=0.43"

# ── Feature: app (React-UI + Flask-Backend) ──
[feature.app.dependencies]
flask = ">=3.0"

[feature.app.tasks]
app = { cmd = "bash app.sh", depends-on = ["postinstall"], description = "rubin-UI starten (lokal: Port 8501, Domino: $DOMINO_APP_PORT)" }

# ── Feature: dev (Test- und Lint-Tools) ──
[feature.dev.dependencies]
pytest = ">=7.4"
pytest-cov = ">=4.1"
ruff = ">=0.3"

[feature.dev.tasks]
test = { cmd = "python -m pytest tests/ -v --tb=short", depends-on = ["postinstall"] }
test-cov = { cmd = "python -m pytest tests/ -v --cov=rubin --cov-report=term-missing", depends-on = ["postinstall"] }
lint = "ruff check rubin/ app/ tests/ run_*.py"
lint-fix = "ruff check --fix rubin/ app/ tests/ run_*.py"

[environments]
default = { features = ["shap"], solve-group = "default" }
app = { features = ["shap", "app"], solve-group = "default" }
dev = { features = ["shap", "dev"], solve-group = "default" }
